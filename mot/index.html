<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zeedna 3amiat – Mot</title>
  <link rel="stylesheet" href="/style.css?v=108" />
</head>
<body>
  <div class="topbar">
    <div class="topbarInner">
      <div class="brand">
        <a class="homeBtn" href="/recherche/"><span aria-hidden="true">←</span></a>
        <div class="logo">🪔</div>
      </div>
      <div class="actions">
        <button class="iconBtn" id="btnTheme" title="Mode sombre/clair">🌙</button>
        <a class="cta" href="/ajouter/">＋ Ajoute ton mot</a>
      </div>
    </div>
  </div>

  <div class="wordWrap">
    <div class="heroCard">
      <div id="status" data-state="loading">Chargement…</div>
      <div class="wordCard" id="wordCard" style="margin-top:12px"></div>
    </div>

    <div class="footer">
      <div>© Zeedna 3amiat</div>
      <div>v1.0.0</div>
    </div>
  </div>

  <script src="/js/mot.js?v=108"></script>
  <script>
    const key='zeedna_theme';
    const apply=()=>{document.documentElement.dataset.theme=localStorage.getItem(key)||'dark'};
    apply();
    document.getElementById('btnTheme').addEventListener('click',()=>{
      const cur=localStorage.getItem(key)||'dark';
      localStorage.setItem(key, cur==='dark'?'light':'dark');
      apply();
    });
  </script>
</body>
</html>
