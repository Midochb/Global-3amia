<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zeedna 3amiat — Contribuer</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand" id="homeBtn" role="button" tabindex="0" title="Retour à l’accueil">
      <div class="logo">
        <img src="/LogoV2.png" alt="Zeedna" style="width:28px;height:28px;object-fit:contain;" />
      </div>
      <div>
        <div class="title">Zeedna 3amiat</div>
        <div class="subtitle" id="t_subtitle" data-i18n="c_subtitle">Contribuer</div>
      </div>
    </div>

    <button class="cta" id="themeToggle" type="button" aria-label="Thème">🌙</button>
  </header>

  <main class="container">
    <section class="card" style="cursor:default;">
      <div style="font-weight:800;font-size:18px;margin-bottom:6px;"
           id="t_title" data-i18n="c_title">
        Proposer un mot
      </div>

      <div class="muted small" style="margin-bottom:14px;"
           id="t_hint" data-i18n="c_hint">
        Astuce : si plusieurs sens, sépare avec des virgules (ex : beaucoup, énormément, vachement).
      </div>

      <!-- IMPORTANT: method POST + target hidden_iframe (évite CORS) -->
      <form id="contribForm" method="POST" target="hidden_iframe">
        <!-- Anti-spam (honeypot) -->
        <div style="display:none;">
          <label>Website</label>
          <input type="text" id="website" name="website" autocomplete="off" />
        </div>

        <label class="small muted" id="t_word_ar_lab" data-i18n="c_word_ar_lab">Mot (arabe)</label>
        <!-- name = mot_arabe (CONTRIBUTIONS header) -->
        <input class="search" id="word_ar" name="mot_arabe" required dir="rtl"
               data-i18n-placeholder="c_word_ar_ph"
               placeholder="اكتب الكلمة هنا" />

        <div style="height:10px;"></div>

        <label class="small muted" id="t_phon_lab" data-i18n="c_phon_lab">Phonétique (suggestion auto)</label>
        <!-- name = transliteration (MOTS header) -->
        <input class="search" id="phonetic" name="transliteration" autocomplete="off"
               data-i18n-placeholder="c_phon_ph"
               placeholder="ex: 7iit / hiit" />

        <div style="height:10px;"></div>

        <label class="small muted" id="t_trad_fr_lab" data-i18n="c_sens_fr_lab">Traduction (FR)</label>
        <!-- name = sens_fr (CONTRIBUTIONS header) -->
        <input class="search" id="trad_fr" name="sens_fr" required
               data-i18n-placeholder="c_sens_fr_ph"
               placeholder="ex : beaucoup, énormément, vachement" />

        <div style="height:10px;"></div>

        <label class="small muted" id="t_example_lab" data-i18n="c_example_lab">Exemple</label>
        <!-- name = exemple_usage (CONTRIBUTIONS header) -->
        <input class="search" id="example" name="exemple_usage" required
               data-i18n-placeholder="c_example_ph"
               placeholder="ex : أنا لوّاج على خدمة" />

        <div style="height:10px;"></div>

        <label class="small muted" id="t_dialect_lab" data-i18n="c_country_lab">Dialecte / pays</label>
        <!-- name = pays_code (CONTRIBUTIONS header) -->
        <select class="select" id="dialect" name="pays_code" required>
          <option value="">—</option>
          <option value="TN">🇹🇳 Tunisie</option>
          <option value="MA">🇲🇦 Maroc</option>
          <option value="DZ">🇩🇿 Algérie</option>
          <option value="LY">🇱🇾 Libye</option>
          <option value="EG">🇪🇬 Égypte</option>
          <option value="LB">🇱🇧 Liban</option>
          <option value="SA">🇸🇦 Arabie Saoudite</option>
          <option value="IQ">🇮🇶 Irak</option>
          <option value="SD">🇸🇩 Soudan</option>
        </select>

        <div style="height:10px;"></div>

        <label class="small muted" id="t_city_lab" data-i18n="c_region_lab">Ville / région</label>
        <!-- name = region (CONTRIBUTIONS header) -->
        <input class="search" id="city" name="region" required
               data-i18n-placeholder="c_region_ph"
               placeholder="ex : Zarzis, Casablanca..." />

        <div style="height:10px;"></div>

        <label class="small muted" id="t_user_id_lab" data-i18n="c_user_id_lab">Ton nom / ID (optionnel)</label>
        <!-- name = user_id (CONTRIBUTIONS header) -->
        <input class="search" id="user_id" name="user_id"
               data-i18n-placeholder="c_user_id_ph"
               placeholder="ex : mehdi, zeedna_friends" />

        <div style="height:14px;"></div>

        <button class="cta" type="submit" id="submitBtn"
                data-i18n="c_submit_btn"
                style="width:100%; text-align:center;">
          Envoyer
        </button>

        <div id="msg" class="small muted" style="margin-top:10px;"></div>
      </form>

      <!-- IMPORTANT: iframe cachée pour recevoir la réponse Apps Script -->
      <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>
    </section>
  </main>

  <script src="/utils.js"></script>
  <script src="/contribuer/contribute.js"></script>
</body>
</html>
