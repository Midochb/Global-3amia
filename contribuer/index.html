<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Zeedna 3amiat — Ajoute ton mot</title>
<link href="/style.css?v=98" rel="stylesheet"/>
</head>
<body>
<header class="topbar">
<div class="brand" id="homeBtn" role="button" tabindex="0" title="Retour à la recherche">
<div class="logo">
<img alt="Zeedna" class="brandLogo brandLogo--lamp" src="/assets/LogoV2.png"/>
</div>
<div>
<div class="title">Zeedna 3amiat</div>
<div class="subtitle" data-i18n="c_subtitle" id="t_subtitle">Ajoute ton mot</div>
</div>
</div>

<div class="headerActions"><button aria-label="Thème" class="cta" id="themeToggle" type="button">🌙</button></div></header>
<main class="container">
<section class="card" style="cursor:default;">
<div data-i18n="c_title" id="t_title" style="font-weight:800;font-size:18px;margin-bottom:6px;">
        Proposer un mot
      </div>
<div class="muted small" data-i18n="c_hint" id="t_hint" style="margin-bottom:14px;">
        Astuce : si plusieurs sens, sépare avec des virgules (ex : beaucoup, énormément, vachement).
      </div>
<!-- IMPORTANT: method POST + target hidden_iframe (évite CORS) -->
<form id="contribForm" method="POST" target="hidden_iframe">
<!-- Anti-spam (honeypot) -->
<div style="display:none;">
<label>Website</label>
<input autocomplete="off" id="website" name="website" type="text"/>
</div>
<label class="small muted" data-i18n="c_word_ar_lab" id="t_word_ar_lab">Mot (arabe)</label>
<!-- name = mot_arabe (CONTRIBUTIONS header) -->
<input class="search" data-i18n-placeholder="c_word_ar_ph" dir="rtl" id="word_ar" name="mot_arabe" placeholder="اكتب الكلمة هنا" required=""/>
<div style="height:10px;"></div>
<label class="small muted" data-i18n="c_phon_lab" id="t_phon_lab">Phonétique (suggestion auto)</label>
<!-- name = transliteration (MOTS header) -->
<input autocomplete="off" class="search" data-i18n-placeholder="c_phon_ph" id="phonetic" name="transliteration" placeholder="ex: 7iit / hiit"/>
<div class="small muted" style="margin-top:6px;">
<a data-i18n="c_tr_help_link" href="/transliteration/" style="text-decoration:underline;">Guide translittération</a>
</div>
<div style="height:10px;"></div>
<label class="small muted" data-i18n="c_sens_fr_lab" id="t_trad_fr_lab">Traduction (FR)</label>
<!-- name = sens_fr (CONTRIBUTIONS header) -->
<input class="search" data-i18n-placeholder="c_sens_fr_ph" id="trad_fr" name="sens_fr" placeholder="ex : beaucoup, énormément, vachement" required=""/>
<div style="height:10px;"></div>
<label class="small muted" data-i18n="c_example_lab" id="t_example_lab">Exemple</label>
<!-- name = exemple_usage (CONTRIBUTIONS header) -->
<input class="search" data-i18n-placeholder="c_example_ph" id="example" name="exemple_usage" placeholder="ex : أنا لوّاج على خدمة" required=""/>
<div style="height:10px;"></div>
<label class="small muted" data-i18n="c_country_lab" id="t_dialect_lab">Dialecte / pays</label>
<!-- name = pays_code (CONTRIBUTIONS header) -->
<select class="select" id="dialect" name="pays_code" required="">
<option value="">—</option>
<option value="TN">🇹🇳 Tunisie</option>
<option value="MA">🇲🇦 Maroc</option>
<option value="DZ">🇩🇿 Algérie</option>
<option value="LY">🇱🇾 Libye</option>
<option value="EG">🇪🇬 Égypte</option>
<option value="LB">🇱🇧 Liban</option>
<option value="SA">🇸🇦 Arabie Saoudite</option>
<option value="IQ">🇮🇶 Irak</option>
<option value="SD">🇸🇩 Soudan</option>
</select>
<div style="height:10px;"></div>
<label class="small muted" data-i18n="c_region_lab" id="t_city_lab">Ville / région</label>
<!-- name = region (CONTRIBUTIONS header) -->
<input class="search" data-i18n-placeholder="c_region_ph" id="city" name="region" placeholder="ex : Zarzis, Casablanca..." required=""/>
<div style="height:10px;"></div>
<label class="small muted" data-i18n="c_user_id_lab" id="t_user_id_lab">Ton nom / ID (optionnel)</label>
<!-- name = user_id (CONTRIBUTIONS header) -->
<input class="search" data-i18n-placeholder="c_user_id_ph" id="user_id" name="user_id" placeholder="ex : mehdi, zeedna_friends"/>
<div style="height:14px;"></div>
<button class="cta" data-i18n="c_submit_btn" id="submitBtn" style="width:100%; text-align:center;" type="submit">
          Envoyer
        </button>
<div class="small muted" id="msg" style="margin-top:10px;"></div>
</form>
<!-- IMPORTANT: iframe cachée pour recevoir la réponse Apps Script -->
<iframe id="hidden_iframe" name="hidden_iframe" style="display:none;"></iframe>
</section>
</main>
<script src="/js/utils.js?v=96"></script>
<script src="/contribuer/contribute.js"></script>
</body>
</html>
