<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zeedna 3amiat – Recherche</title>
  <link rel="stylesheet" href="/style.css?v=108" />
</head>
<body>
  <div class="topbar">
    <div class="topbarInner">
      <div class="brand">
        <a class="homeBtn" href="/"><span aria-hidden="true">⌂</span></a>
        <div class="logo">🪔</div>
      </div>
      <div class="actions">
        <button class="iconBtn" id="btnTheme" title="Mode sombre/clair">🌙</button>
        <a class="cta" href="/ajouter/">＋ Ajoute ton mot</a>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="heroCard">
      <div class="searchRow">
        <div id="suggestWrap">
          <input class="input" id="q" type="search" placeholder="Chercher un mot (arabe, translit, FR, arabe classique)…" autocomplete="off" />
          <div class="suggestBox" id="suggestBox"></div>
        </div>
        <button class="btn" id="btnSearch">Rechercher</button>
        <select class="input select" id="country" aria-label="Filtrer par pays"></select>
      </div>

      <div class="statusRow">
        <div id="status" data-state="loading">Chargement…</div>
        <div id="count">0 résultat(s)</div>
      </div>

      <div class="resultsGrid" id="results"></div>

      <div class="loadMoreWrap">
        <button class="btn" id="loadMore" style="display:none">Charger plus</button>
      </div>
    </div>

    <div class="footer">
      <div>© Zeedna 3amiat</div>
      <div>v1.0.0</div>
    </div>
  </div>

  <script src="/js/app.js?v=108"></script>
  <script>
    const key='zeedna_theme';
    const apply=()=>{document.documentElement.dataset.theme=localStorage.getItem(key)||'dark'};
    apply();
    document.getElementById('btnTheme').addEventListener('click',()=>{
      const cur=localStorage.getItem(key)||'dark';
      localStorage.setItem(key, cur==='dark'?'light':'dark');
      apply();
    });
  </script>
</body>
</html>
