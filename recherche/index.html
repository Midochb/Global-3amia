<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- SEO (on ne touche pas, comme demandé) -->
  <title>Zeedna 3amiat – Recherche</title>
  <meta name="description" content="Recherche Zeedna 3amiat : dictionnaire participatif des dialectes arabes (darija, tunisien, marocain, algérien, etc.)." />

  <link rel="stylesheet" href="../style.css" />
</head>

<body>

<!-- ===================== HEADER ===================== -->
<header class="topbar">

  <!-- Home (retour présentation) -->
  <a class="iconBtn home-btn" href="/" aria-label="Accueil" title="Accueil">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M3 10.5 12 3l9 7.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      <path d="M5 10v10h14V10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      <path d="M9 20v-6h6v6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
  </a>

  <!-- Logo centré (retour recherche) -->
  <a class="brand brand-center" href="/recherche" aria-label="Recherche" title="Recherche">
    <img class="brandLogo brandLogo--lamp" src="/assets/logo_search.png" alt="Zeedna" />
  </a>

  <!-- Actions -->
  <div class="headerActions">
    <button id="themeToggle" class="iconBtn" type="button" aria-label="Changer le thème">
      🌙
    </button>
    <a class="cta" href="/contribuer" data-i18n="home_contribute_btn">
      ➕ Contribuer
    </a>
  </div>

</header>

<!-- ===================== MAIN ===================== -->
<main class="container">

  <!-- Recherche -->
  <section class="controls">
    <div class="searchwrap">
      <div class="searchbar">
        <input
          id="q"
          class="search"
          type="search"
          autocomplete="off"
          data-i18n-placeholder="home_search_ph"
          placeholder="Chercher un mot (arabe, translit, FR, EN, NL, Fouss7a)..."
        />

        <!-- Bouton "Rechercher" (on n'affiche pas toute la liste à chaque lettre) -->
        <button id="searchBtn" class="cta searchBtn" type="button" data-i18n="search_btn">Rechercher</button>
      </div>

      <!-- Suggestions (type Google) -->
      <div id="suggestions" class="suggestions" aria-label="Suggestions" role="listbox"></div>
    </div>

    <select id="dialect" class="select">
      <option value="">Tous les dialectes</option>
    </select>
  </section>

  <!-- Status -->
  <section class="meta">
    <div id="status" class="status muted">Prêt    </div>
    <div id="count" class="count">
      0 résultat(s)
    </div>
  </section>

  <!-- Résultats -->
  <section id="results" class="results"></section>

  <!-- Footer -->
  <footer class="footer">
    <div>© Zeedna 3amiat</div>
    <div class="muted">v1.0.0</div>
  </footer>

</main>

<!-- ===================== MODAL ===================== -->
<div id="backdrop" class="modal-backdrop" aria-hidden="true"></div>

<div id="modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">

  <div class="modal-header">
    <div>
      <div id="m_word" class="word-ar"></div>
      <div id="m_translit" class="translit"></div>
    </div>
    <button id="m_close" class="close-btn" data-i18n="modal_close">
      Fermer
    </button>
  </div>

  <div id="m_meta" class="trads"></div>
  <div id="m_kv" class="kv"></div>

  <div class="syn-wrap">
    <div class="tag">
      Autres dialectes / synonymes
    </div>
    <div id="m_syn" class="syn-list"></div>
    <div class="small muted" style="margin-top:10px;">
      Astuce : correspondances trouvées automatiquement via les sens FR + EN.
    </div>
  </div>

</div>

<!-- ===================== SCRIPTS ===================== -->
<!-- ⚠️ ordre important -->
<script src="../utils.js"></script>
<script src="../synonyms.js"></script>
<script src="../app.js"></script>

</body>
</html>
